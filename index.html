<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aktau Marina Bay — отель на первой береговой линии Каспийского моря в Актау">
  <title>Aktau Marina Bay — отель у моря</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ===== BLOCK 1: Hero ===== -->
  <section class="hero" id="hero">
    <div class="hero__overlay" aria-hidden="true"></div>

    <div class="hero__inner">
      <header class="header">
        <div class="container header__container">
          <a href="#" class="logo">
            <svg class="logo__icon" viewBox="0 0 36 36" fill="none" aria-hidden="true">
              <path d="M6 28 L18 8 L30 28 Z" stroke="white" stroke-width="1.5" fill="none"/>
              <path d="M10 28 L18 14 L26 28" stroke="white" stroke-width="1" fill="none" opacity="0.6"/>
              <line x1="18" y1="8" x2="18" y2="32" stroke="white" stroke-width="1.5"/>
              <path d="M4 32 H32" stroke="white" stroke-width="1.5"/>
            </svg>
            <span class="logo__text">Aktau Marina Bay</span>
          </a>

          <div class="header__actions">
            <button class="menu-btn" type="button" aria-label="Открыть меню">
              <span class="menu-btn__lines">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
            <a href="https://wa.me/77782395986" class="btn-outline" target="_blank" rel="noopener">
              Связаться в WhatsApp
            </a>
          </div>
        </div>
      </header>

      <div class="container hero__content">
        <div class="hero__text">
          <h1 class="hero__title">Там, где море начинается у&nbsp;вашего порога</h1>
          <p class="hero__subtitle">
            Остановитесь у самого моря. Комфортный отдых, деловые возможности
            и инфраструктура курорта — в нескольких шагах от вашего номера.
          </p>
        </div>
      </div>
    </div>

    <div class="booking">
      <div class="container booking__container">
        <div class="booking__field">
          <span class="booking__label">Заезд</span>
          <div class="booking__value">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
            </svg>
            <span>10.06.2026</span>
          </div>
        </div>

        <div class="booking__field">
          <span class="booking__label">Выезд</span>
          <div class="booking__value">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
            </svg>
            <span>11.06.2026</span>
          </div>
        </div>

        <div class="booking__field">
          <span class="booking__label">Гости</span>
          <div class="booking__value">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span>2 взрослых, 0 детей</span>
          </div>
        </div>

        <div class="booking__promo">
          <button class="booking__promo-btn" type="button">У меня есть промокод</button>
        </div>

        <div class="booking__submit">
          <button class="btn-primary" type="button">Найти номер</button>
        </div>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
